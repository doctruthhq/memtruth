      .navy { fill: #071832; }
      .muted { fill: #5d6b7e; }
      .blue { fill: #0369d8; }
      .line { stroke: #1495ed; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1495ed; }
      .card { fill: #ffffff; stroke: #dbe5ef; stroke-width: 2; filter: url(#shadow); }
      .pill { fill: #f6fbff; stroke: #dbe5ef; stroke-width: 1.5; }
    </style>
  </defs>

