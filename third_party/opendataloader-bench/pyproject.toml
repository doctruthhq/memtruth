[project]
name = "opendataloader-bench"
version = "0.1.0"
description = "Benchmark for PDF document structure and layout analysis engines"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "apted>=1.0.3",
    "beautifulsoup4>=4.14.3",
    "easyocr>=1.7.2",
    "lxml>=6.1.0",
    "matplotlib>=3.10.8",
    "pdf2image>=1.17.0",
    "py-cpuinfo>=9.0.0",
    "rapidfuzz>=3.14.3",
]

[project.optional-dependencies]
dev = ["pytest>=9.0.3"]
# Engine groups (install individually or combine)
opendataloader = ["opendataloader-pdf[hybrid]>=2.2.1"]
docling = ["docling>=2.84.0"]
markitdown = ["markitdown[pdf]>=0.1.5"]
edgeparse = ["edgeparse"]
liteparse = ["liteparse"]
# Convenience groups
all-safe = [
    "opendataloader-pdf[hybrid]>=2.2.1",
    "docling>=2.84.0",
    "markitdown[pdf]>=0.1.5",
    "edgeparse",
    "pypdf>=6.10.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv]
constraint-dependencies = [
    "cryptography>=46.0.7",
    "python-multipart>=0.0.26",
]
