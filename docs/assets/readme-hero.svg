<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">DocTruth source cited extraction</title>
  <desc id="desc">A document, field-level citations, and an extracted Java record connected by source evidence lines.</desc>
  <defs>
    <linearGradient id="page" x1="124" y1="202" x2="506" y2="652" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1">
      <stop stop-color="#071832"/>
      <stop offset="1" stop-color="#0369d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071832" flood-opacity="0.14"/>
